<!DOCTYPE html>
<html lang="en">

        <title>Love Notes</title>
        <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <body>
        <button id="refresh-button" class="no-select">

        </button>

        <div id="gradient-overlay" class="gradient-overlay"></div>

        <div id="auth-container" style="display:none">
            <form id="signup-form" style="display:none !important;">
                <input type="text" id="signup-name" placeholder="Enter your name" required>
                <input type="email" id="signup-email" placeholder="Enter your email" required>
                <input type="password" id="signup-password" placeholder="Enter your password" required>
                <button type="submit">Sign Up</button>
            </form>            
            <h2>Sign In</h2>
            <form id="signin-form">
                <input type="email" id="signin-email" placeholder="Email" required>
                <input type="password" id="signin-password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div id="notes-container" class="notes-container"></div>
        <div id="form-container" class="form-container" style="display:none;">
            <form id="note-form">
                <textarea id="note-input" placeholder="Write your note here..." required></textarea>
                <div class="mood-buttons no-select">
                    <button id="happy-button" type="button" class="mood-button no-select" data-mood="happy" style="background-color:rgb(226, 211, 96); color: black;"><p class="mood-button-text">😊</p></button>
                    <button id="sad-button" type="button" class="mood-button no-select" data-mood="sad" style="background-color: rgb(36, 36, 108);"><p class="mood-button-text">😔</p></button>
                    <button id="excited-button" type="button" class="mood-button no-select" data-mood="excited" style="background-color: rgb(255, 151, 31);"><p class="mood-button-text">😁</p></button>
                    <button id="romantic-button" type="button" class="mood-button no-select" data-mood="romantic" style="background-color: rgb(164, 41, 100);"><p class="mood-button-text">😍</p></button>
                    <button id="thoughtful-button" type="button" class="mood-button no-select" data-mood="thoughtful" style="background-color: rgb(112, 19, 112);"><p class="mood-button-text">🤔</p></button>
                    <button id="hot-button" type="button" class="mood-button no-select" data-mood="hot" style="background-color: rgb(101, 9, 37);"><p class="mood-button-text">😏</p></button>
                    <button id="demon-button" type="button" class="mood-button no-select" data-mood="demon" style="background-color: rgb(180, 0, 0);"><p class="mood-button-text">👹</p></button>
                </div>
                <button id="send-button" type="submit">Send Note</button>
            </form>
        </div>
        <div id="heart-container" class="no-select" style="display: none;">
            <svg id="heart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="550" height="550" style="fill: white; cursor: pointer;">
                <path id="heart-path" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div id="particles-js" class="particles-js"></div>

        <div id="love-meter-container" class="love-meter-container fade-out">
            <div id="love-meter" class="love-meter">
                <div id="my-love-meter-fill" class="love-meter-fill partner-fill"></div>
                <div id="partner-love-meter-fill" class="love-meter-fill"></div>
            </div>
            <div id="my-initial" class="initial">J</div>
            <div id="partner-initial" class="initial">E</div>
            <div id="my-stats" class="stats-popup" style="display: none;"></div>
            <div id="partner-stats" class="stats-popup" style="display: none;"></div>
        </div>
    
        <!-- Firebase SDK -->
        <script type="module">
            import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
            import { getFirestore } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
            import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging.js";
            import { signUp, signIn, checkAuthState } from './auth.js';
            import { saveUser, addNote, getNotes, getSenderName, markAsRead, sendHeartbeat, listenForHeartbeats, cleanupOldHeartbeats } from './firestore.js';
            import { showContainer, showHeart, displayHeartbeat, createNoteParticles, fadeOutNoteParticles, updateLoveMeter, fadeOutLoveMeter, fadeInLoveMeter, hideStats } from './ui.js';

            const auth = getAuth();
            const db = getFirestore();
            const messaging = getMessaging();

            let notes = [];
            let currentIndex = 0;
            let selectedMood = "";

            // if ('serviceWorker' in navigator) {

            //             if (token) {

            // onMessage(messaging, (payload) => {
            //     console.log('Message received. ', payload);
            //     const notificationTitle = payload.notification.title;
            //     const notificationOptions = {
            //         body: payload.notification.body,
            //         icon: payload.notification.icon
            //     };
            //     new Notification(notificationTitle, notificationOptions);
            // });

            document.addEventListener('click', (event) => {
                const myStats = document.getElementById('my-stats');
                const partnerStats = document.getElementById('partner-stats');
                const myInitial = document.getElementById('my-initial');
                const partnerInitial = document.getElementById('partner-initial');

                if (!myInitial.contains(event.target) && !myStats.contains(event.target)) {
                    hideStats(myStats);
                }

                if (!partnerInitial.contains(event.target) && !partnerStats.contains(event.target)) {
                    hideStats(partnerStats);
                }
            });

            document.getElementById("refresh-button").addEventListener("click", () => {
                const note = document.querySelector(".note");
                const heart = document.getElementById("heart-container");
                const noteInput = document.getElementById("note-input");
                const moodButtons = document.querySelectorAll(".mood-button");
                const sendButton = document.getElementById("send-button");
                const refreshButton = document.getElementById("refresh-button");

                if (note) note.classList.add("fade-out");
                if (heart) heart.classList.add("fade-out");
                if (noteInput) noteInput.classList.add("fade-out");
                moodButtons.forEach(button => button.classList.add("fade-out"));
                if (sendButton) sendButton.classList.add("fade-out");
                if (refreshButton) refreshButton.classList.add("spin");

                const gradientOverlay = document.getElementById("gradient-overlay");
                gradientOverlay.style.opacity = 0;

                // Fade out the hearts
                fadeOutNoteParticles();

                fadeOutLoveMeter();

                setTimeout(() => {
                    location.reload();
                    console.log("Page refreshed");
                }, 1000);
            });

            checkAuthState(async (user) => {
                if (user) {
                    document.getElementById("auth-container").style.display = "none";
                    document.getElementById("notes-container").style.display = "block";
                    showContainer(document.getElementById("notes-container"));
                    await updateLoveMeter(user.uid); // Update the love meter on authentication
                    getNotes(user.uid).then((fetchedNotes) => {
                        console.log("Fetched notes:", fetchedNotes); // Debugging statement
                        notes = fetchedNotes;
                        currentIndex = 0; // Reset currentIndex when fetching new notes
                        if (notes.length > 0) {
                            showNextNote();
                        } else {
                            document.getElementById("notes-container").style.display = "none";
                            showHeart();
                            fadeInLoveMeter();
                            document.getElementById("form-container").style.display = "block";
                            showContainer(document.getElementById("form-container"));
                        }
                    }).catch((error) => {
                        console.error("Error fetching notes:", error); // Error handling
                    });

                    // Listen for heartbeats
                    listenForHeartbeats(user.uid, () => {
                        displayHeartbeat();
                    });

                    // Cleanup old heartbeats periodically
                    setInterval(() => {
                        cleanupOldHeartbeats();
                    }, 5000); // Adjust the interval as needed
                } else {
                    document.getElementById("auth-container").style.display = "block";
                    document.getElementById("notes-container").style.display = "none";
                }
            });

            document.querySelectorAll('.mood-button').forEach(button => {
                button.addEventListener('click', () => {
                    selectedMood = button.getAttribute('data-mood');
                    document.querySelectorAll('.mood-button').forEach(b => b.classList.remove('selected'));
                    button.classList.add('selected');
                });
            });

            document.getElementById("note-form").addEventListener("submit", async (e) => {
                e.preventDefault();

                const noteInput = document.getElementById("note-input");
                const moodButtons = document.querySelectorAll(".mood-button");
                const sendButton = document.getElementById("send-button");

                if (!noteInput || !sendButton || moodButtons.length === 0) {
                    console.error("One or more required elements are missing from the DOM.");
                    return;
                }

                const note = noteInput.value;
                if (!note || !selectedMood) {
                    console.warn("Note or mood is missing.");
                    return;
                }

                noteInput.disabled = true;
                sendButton.disabled = true;
                moodButtons.forEach(button => button.disabled = true);

                moodButtons.forEach(button => button.classList.remove("fade-in"));
                moodButtons.forEach(button => button.classList.add("fade-out"));
                sendButton.classList.remove("fade-in");
                sendButton.classList.add("fade-out");

                noteInput.classList.remove("slide-up-reset");
                noteInput.classList.add("slide-up");

                fadeOutLoveMeter();

                setTimeout(async () => {
                    await addNote(note, selectedMood, auth.currentUser.uid);

                    noteInput.value = "";
                    selectedMood = "";

                    setTimeout(() => {
                        noteInput.classList.remove("slide-up");
                        noteInput.classList.add("slide-up-reset");

                        moodButtons.forEach(button => {
                            button.classList.remove("fade-out");
                            button.classList.add("fade-in");
                            button.classList.remove("selected");
                        });
                        sendButton.classList.remove("fade-out");
                        sendButton.classList.add("fade-in");

                        noteInput.disabled = false;
                        sendButton.disabled = false;
                        moodButtons.forEach(button => button.disabled = false);
                        fadeInLoveMeter();
                    }, 1000);

                    await updateLoveMeter(auth.currentUser.uid); // Update the love meter after adding a note

                    getNotes(auth.currentUser.uid).then((fetchedNotes) => {
                        console.log("Fetched notes after adding:", fetchedNotes); // Debugging statement
                        notes = fetchedNotes;
                        currentIndex = 0; // Reset currentIndex when fetching new notes
                        if (notes.length > 0) {
                            showNextNote();
                        } else {
                            document.getElementById("notes-container").style.display = "none";
                            showHeart();
                            document.getElementById("form-container").style.display = "block";
                            showContainer(document.getElementById("form-container"));
                        }
                    }).catch((error) => {
                        console.error("Error fetching notes after adding:", error); // Error handling
                    });
                }, 1000);
            });

            const moodGradients = {
                happy: "linear-gradient(to top, #ffec61, #ffb74d)", // Yellow to light orange
                sad: "linear-gradient(to top, #2860bd, #546ac9)", // Blue to light blue
                excited: "linear-gradient(to top, #ff5c4a, #d09938)", // Coral to peach
                romantic: "linear-gradient(to top, #FF69B4, #c23c32)", // Pink to red
                thoughtful: "linear-gradient(to top, #6a5acd, #a978ff)", // Slate blue to light lavender
                hot: "linear-gradient(to top, #750e0e, #800832)", // Red to purpley red
                demon: "linear-gradient(to top, #d81111, #a30000)", // Bright red to dark red
                default: "linear-gradient(to top, #f0f0f0, #ffffff)" // Light gray gradient
            };

            async function showNextNote() {
                try {
                    if (currentIndex < notes.length) {
                        const note = notes[currentIndex];
                        const senderName = await getSenderName(note.sender);
                        const noteElement = document.createElement('div');
                        noteElement.classList.add('note');
                        noteElement.innerHTML = `${note.content}<br><span class="sender-name">- ${senderName}</span>`;
                        noteElement.addEventListener('click', () => handleNoteClick(noteElement, note.id));

                        // Get the gradient based on the note's mood
                        const gradient = moodGradients[note.mood] || moodGradients.default;

                        // Simultaneously update the gradient and display the new note
                        const gradientOverlay = document.getElementById("gradient-overlay");
                        gradientOverlay.style.transition = 'opacity 1s ease-out'; // Set the transition duration
                        gradientOverlay.style.opacity = 0; // Start fading out the gradient

                        // Wait for the fade-out transition to complete before applying the new gradient
                        setTimeout(() => {
                            gradientOverlay.style.background = gradient;
                            gradientOverlay.style.opacity = 1; // Fade in the new gradient

                            // Append the note element after the gradient transition starts
                            document.getElementById("notes-container").appendChild(noteElement);

                            // Trigger mood-specific animations
                            createNoteParticles(note.mood);
                        }, 1000); // Match this to the fade-out duration
                    }
                } catch (error) {
                    console.error("Error showing next note:", error); // Error handling
                }
            }

            function handleNoteClick(noteElement, noteId) {
                // Start both animations (note and gradient) simultaneously
                noteElement.style.animation = 'slideOutUp 1s ease-out'; // Apply the slide out animation

                // Fade out the gradient overlay at the same time as the note exits
                const gradientOverlay = document.getElementById("gradient-overlay");
                gradientOverlay.style.transition = 'opacity 1s ease-out';
                gradientOverlay.style.opacity = 0; // Fade out the gradient overlay

                // Fade out the hearts
                fadeOutNoteParticles();

                // Remove the note from the DOM after the animation completes
                noteElement.addEventListener('animationend', () => {
                    markAsRead(noteId); // Mark the note as read after fade out
                    document.getElementById("notes-container").innerHTML = ""; // Clear the note container
                    setTimeout(() => {
                        handleNextNoteClick(); // Show next note after a small delay
                    }, 200); // Small delay to ensure note is removed before next is shown
                });
            }

            function handleNextNoteClick() {
                currentIndex++;
                document.removeEventListener("click", handleNextNoteClick); // Remove event listener to avoid multiple triggers

                if (currentIndex < notes.length) {
                    showNextNote(); // Show next note
                } else {
                    // After all notes are shown, reset the gradient overlay to the default
                    const gradientOverlay = document.getElementById("gradient-overlay");
                    gradientOverlay.style.opacity = 0; // Fade out the overlay
                    setTimeout(() => {
                        gradientOverlay.style.background = moodGradients.default; // Set back to default gradient
                        gradientOverlay.style.opacity = 1; // Fade in the default gradient
                    }, 1000); // Match this to the fade-out duration

                    document.getElementById("notes-container").style.display = "none";
                    showHeart();
                    document.getElementById("form-container").style.display = "block"; // Show form to send a new note
                    showContainer(document.getElementById("form-container"));
                    document.getElementById("notes-container").innerHTML = ""; // Clear notes container
                }
            }

            document.getElementById("note-input").addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });

            // Event listener for heart click
            document.getElementById("heart-path").addEventListener("click", () => {
                console.log("Heart clicked");
                displayHeartbeat();
                // Assuming sendHeartbeat is defined elsewhere
                sendHeartbeat(auth.currentUser.uid);
            });
        </script>
